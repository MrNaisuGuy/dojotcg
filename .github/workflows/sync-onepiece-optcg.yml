name: Sync One Piece OPTCG Enrichment

on:
  workflow_dispatch:
  schedule:
    - cron: "25 16 * * 1"

jobs:
  sync-optcg-enrichment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Enrich with OPTCG images and prices
        working-directory: frontend
        run: npm run sync:onepiece-optcg
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ONEPIECE_ENRICH_REQUEST_DELAY_MS: 250
          ONEPIECE_ENRICH_REQUEST_TIMEOUT_MS: 30000
