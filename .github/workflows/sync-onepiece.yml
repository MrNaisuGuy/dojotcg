name: Sync One Piece Cards

on:
  workflow_dispatch:
  schedule:
    - cron: "25 14 * * 1"

jobs:
  sync-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run sync script
        working-directory: frontend
        run: npm run sync:onepiece
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ONEPIECE_SYNC_PROVIDER: official
          ONEPIECE_SYNC_REQUEST_DELAY_MS: 750
          ONEPIECE_SYNC_REQUEST_TIMEOUT_MS: 60000
